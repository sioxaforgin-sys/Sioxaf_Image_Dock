name: Build & Push SwarmUI Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Backends.fds

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sioxaforgin-sys/swarmui-sioxa

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Aggressively free disk space (~25 GB recovered) ────
      # ubuntu-latest ships with ~14 GB free. Our image needs ~30 GB
      # (base + two checkpoints + ComfyUI venv + layer cache).
      # This action removes Android SDK, .NET, Haskell, large apt
      # packages, pre-pulled Docker images, and swap — freeing ~25 GB.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false   # keep Go/Node/Python — needed by actions
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show available disk after cleanup
        run: df -h /

      # ── 3. Set up Docker Buildx ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GHCR ────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sioxaforgin-sys
          password: ${{ secrets.GHCR_PAT }}

      # ── 5. Generate image tags ────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # ── 6. Build and push ─────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── 7. Report digest ──────────────────────────────────────
      - name: Report image digest
        run: |
          echo "✅ Image pushed successfully!"
          echo "Image: ghcr.io/sioxaforgin-sys/swarmui-sioxa:latest"
